  #     - "9000:9000"   # API S3
  #     - "9001:9001"   # Console web d'administration
  #   environment:
  #     MINIO_ROOT_USER: ${S3_ACCESS_KEY:-endirek}
  #     MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-endirek-secret}
  #   command: server /data --console-address ":9001"
  #   volumes:
  #     - endirek_minio:/data
  #   healthcheck:
  #     test: ["CMD", "mc", "ready", "local"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  # Données PostgreSQL persistantes (reset : docker compose down -v).
  endirek_pgdata:
